name: Manual Artist Fetch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # CRITICAL: Allows switching branches
# -----------------------------------------------------------------
      # STEP 1: "The Sync" - מניעת דריסת נתונים
      # מושכים את הרשימה העדכנית מ-dev לפני שהסקריפט רץ
      # -----------------------------------------------------------------
      - name: Fetch latest artists_id.txt from Dev
        run: |
          git fetch origin dev
          # This pulls just the FILE from dev, not the branch history
          git checkout origin/dev -- artists_id.txt
          echo "✅ Synced artists_id.txt with dev branch."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt
      # -----------------------------------------------------------------
      # STEP 2: הרצת הסקריפט (עם הקוד החדש מה-Feature)
      # -----------------------------------------------------------------
      - name: Run Spotify automation
        run: python main.py
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # -----------------------------------------------------------------
      # STEP 3: "Switch & Steal" - העברת הקובץ ל-dev
      # -----------------------------------------------------------------
      - name: Switch to Dev and Steal File
        run: |
          # --- הגדרת משתמש ---
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # --- 1. שמירה זמנית ב-Feature Branch ---
          git add artists_id.txt

          # בדיקה: האם הסקריפט בכלל מצא משהו חדש? אם לא, עוצרים כאן בירוק.
          if git diff --cached --quiet; then
            echo "⚠️ No changes detected in feature branch. Exiting successfully."
            exit 0
          fi

          # שומרים "קומיט זמני" כדי שנוכל למשוך אותו אחר כך
          git commit -m "Temp data commit"

          # --- 2. מעבר ל-Dev ---
          echo "Switching to dev..."
          git fetch origin dev
          git checkout dev

          # --- 3. משיכת הקובץ מהבראנץ' הקודם (המינוס -) ---
          # זה הטריק שגונב את הקובץ מה-Commit הזמני שיצרנו למעלה
          echo "Stealing file from previous branch..."
          git checkout - -- artists_id.txt

          # --- 4. שמירה ודחיפה ל-Dev ---
          git add artists_id.txt

          # בדיקה נוספת ליתר ביטחון (למרות שכבר בדקנו למעלה)
          if git diff --cached --quiet; then
             echo "No changes to push to dev."
          else
             git commit -m "Update artist list [auto]"
             
             # משיכת שינויים אחרונים כדי למנוע התנגשויות (Rebase)
             git pull origin dev --rebase
             
             git push origin HEAD:dev
             echo "✅ Success! Pushed artists_id.txt to dev."
          fi

          
